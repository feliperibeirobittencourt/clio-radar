name: Atualizar dados otimizados do CLIO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Gerar dados otimizados
        run: node scripts/build-data.mjs

      - name: Commit dos arquivos gerados
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Atualiza dados otimizados do CLIO
